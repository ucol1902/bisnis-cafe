<!DOCTYPE html>
<html>
  <head>
    <head>
      <title>Kasir Kita</title>
    </head>
  <body>
    <iframe id="kasirIframe" src="" allowfullscreen="true" width="100%" height="100%"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;"></iframe>
    
    <script>
      window.onload = function() {
        const gasBaseUrl = "https://script.google.com/macros/s/AKfycbz5ugXpPA3u9rOy8GMP7h1DgasxYs06YchoNUruq3lBLl7_iU6WmcBFylBW9xZw8-U/exec";
        const queryString = window.location.search;
        const finalUrl = gasBaseUrl + queryString;
        document.getElementById('kasirIframe').src = finalUrl;
        document.querySelector('iframe').requestFullScreen().catch((err) => {
          console.error(`Error attemping to enable full-screen mode: ${err.message}`);
        });
      };
    </script>
  </body>
</html>
